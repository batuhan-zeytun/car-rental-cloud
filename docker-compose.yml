services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: docker
      APP_VERSION: 0.1.0
      SECRET_KEY: local-compose-secret
      DATABASE_URL: postgresql://car_rental:car_rental@db:5432/car_rental
      REDIS_URL: redis://redis:6379/0
      AUTO_CREATE_DB: "true"
      SEED_SAMPLE_DATA: "true"
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 20s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: car_rental
      POSTGRES_USER: car_rental
      POSTGRES_PASSWORD: car_rental
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U car_rental -d car_rental"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

volumes:
  postgres-data:
