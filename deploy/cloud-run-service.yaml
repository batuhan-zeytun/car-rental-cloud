apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: car-rental-cloud
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/car-rental/car-rental-cloud:latest
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: APP_VERSION
              value: 0.1.0
            - name: AUTO_CREATE_DB
              value: "true"
            - name: SEED_SAMPLE_DATA
              value: "false"
            - name: LOG_LEVEL
              value: INFO
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: car-rental-database-url
                  key: latest
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: car-rental-secret-key
                  key: latest
